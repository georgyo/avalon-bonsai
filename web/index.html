<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avalon: The Resistance Online</title>
    <meta name="theme-color" content="#303f9f" />
    <!-- Inline SVG favicon: no extra request, and beats the empty data: icon in the tab strip. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%8F%B0%3C/text%3E%3C/svg%3E" />

    <!-- Roboto, the Vuetify default UI font (without it the app falls back to a serif face). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&display=swap" />

    <!-- Icon fonts (replacing Vuetify's fa-svg + MDI) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
    <!-- Component styles are injected at runtime by ppx_css (src/style.ml) as hashed classes.
         Genuinely-global rules live here instead: the page reset/font, the imperative toast,
         and the stable hooks the e2e/DOM code selects on (.v-list, .lobby-name, .bottom-sheet,
         .fa-layers). ppx_css's :global() escape emits a literal :global(...) selector that
         browsers drop, so these must be plain global CSS. -->
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      /* Font/color live on html, not body: toplayer portals (modals, sheets, tooltips)
         mount as direct children of <html>, so body-level rules never reach them. */
      html { font-family: Roboto, "Helvetica Neue", Arial, sans-serif; color: #1a1a1a; }
      body { background: #303f9f; }
      * { box-sizing: border-box; }
      input[type="checkbox"] { accent-color: #3949ab; }

      /* top: 64px clears the ~50px app toolbar instead of burying its buttons */
      #toast-container { position: fixed; top: 64px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 2000; align-items: center; }
      @keyframes toast-in { from { opacity: 0; transform: translateY(-8px); } }
      .toast { background: #323232; color: #fff; padding: 10px 18px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); font-size: 0.95rem; max-width: calc(100vw - 24px); animation: toast-in 0.2s ease-out; }

      .v-list { list-style: none; margin: 0; padding: 4px; background: #eceff1; border-radius: 6px; }
      .v-list-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-bottom: 1px solid rgba(0,0,0,0.06); }
      .v-list-item:last-child { border-bottom: none; }
      .v-list-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: #3949ab; }
      .lobby-name { font-weight: 700; }
      .bottom-sheet { width: 100%; background: #e0f7fa; border-radius: 12px 12px 0 0; max-height: 80vh; overflow: auto; }
      /* a centering grid: every layer stacks in the same cell, so numerals/icons center
         without manual offsets (badge-style layers opt out with position: absolute) */
      .fa-layers { position: relative; display: inline-grid; place-items: center; width: 1.4em; height: 1.4em; vertical-align: middle; }
      .fa-layers > * { grid-area: 1/1; text-align: center; }
    </style>

    <!-- The Firebase v12 modular SDK is embedded directly into main.bc.js (vendored bundle
         firebase/vendor/firebase-shim.js, linked via firebase/dune), so there is nothing to
         preload or fetch from gstatic at runtime. -->
  </head>
  <body>
    <div id="app"></div>
    <script defer src="main.bc.js"></script>
  </body>
</html>
