<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Avalon</title>

    <!-- Roboto, the Vuetify default UI font (without it the app falls back to a serif face). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&display=swap" />

    <!-- Icon fonts (replacing Vuetify's fa-svg + MDI) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
    <!-- Component styles are injected at runtime by ppx_css (src/style.ml) as hashed classes.
         Genuinely-global rules live here instead: the page reset/font, the imperative toast,
         and the stable hooks the e2e/DOM code selects on (.v-list, .lobby-name, .bottom-sheet,
         .fa-layers). ppx_css's :global() escape emits a literal :global(...) selector that
         browsers drop, so these must be plain global CSS. -->
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      body { font-family: Roboto, "Helvetica Neue", Arial, sans-serif; background: #303f9f; color: #1a1a1a; }
      * { box-sizing: border-box; }

      #toast-container { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 2000; align-items: center; }
      .toast { background: #323232; color: #fff; padding: 10px 18px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); font-size: 0.95rem; }

      .v-list { list-style: none; margin: 0; padding: 4px; background: #cfd8dc; border-radius: 6px; }
      .v-list-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-bottom: 1px solid rgba(0,0,0,0.06); }
      .v-list-item:last-child { border-bottom: none; }
      .lobby-name { font-weight: 700; }
      .bottom-sheet { width: 100%; background: #e0f7fa; border-radius: 12px 12px 0 0; max-height: 80vh; overflow: auto; }
      .fa-layers { position: relative; display: inline-block; width: 1.4em; height: 1.4em; vertical-align: middle; }
      .fa-layers > * { position: absolute; left: 0; top: 0; width: 100%; text-align: center; }
    </style>

    <!-- Firebase v12 *modular* SDK is loaded by the app itself via dynamic import()
         (see Firebase.on_ready in firebase/firebase.ml). These modulepreload hints just let
         the browser fetch the entry points in parallel with main.bc.js; keep the version in
         sync with firebasejs_base there. -->
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js" />
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js" />
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js" />
  </head>
  <body>
    <div id="app"></div>
    <script defer src="main.bc.js"></script>
  </body>
</html>
