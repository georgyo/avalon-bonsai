name: Nix

# Builds the client bundle hermetically from the opam-nix flake (flake.nix). This compiles
# the OxCaml compiler and the Jane Street Bonsai preview packages from the oxcaml
# opam-repository, so the FIRST run on a cold cache is very slow (tens of minutes). The Nix
# store is cached to the GitHub Actions cache via nix-community/cache-nix-action, so
# subsequent runs reuse the toolchain and are fast. For heavy use, point this at a Cachix
# cache instead (the GHA cache is capped at 10 GB per repo, and the OxCaml closure is large).
#
# The build is fully pure (no --impure): the one dependency with an unpinned git source
# (zarith) is pinned to an explicit rev + hash in flake.nix, and flake.lock pins the opam
# repositories, so resolution and fetching are reproducible.
#
# All third-party actions are pinned to full commit SHAs (tag noted alongside each pin).

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref — a cold OxCaml build is too expensive to waste.
concurrency:
  group: nix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast drift checks that gate the expensive build: committed generated files must match
  # what their sources produce.
  drift-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24

      - name: Verify the vendored Firebase shim matches its sources
        # firebase/vendor/firebase-shim.js is committed; rebuilding it from the pinned
        # package-lock.json must be a no-op, or someone changed the shim sources (or bumped
        # the SDK) without re-vendoring.
        run: |
          cd firebase/shim
          npm ci
          npm run build
          git diff --exit-code ../vendor/firebase-shim.js

      - name: Verify package-defs.lock matches flake.lock (materialized resolution not stale)
        # package-defs.json is the materialized opam resolution; package-defs.lock records
        # the opam repo input revs it was generated against. If flake.lock moved those revs
        # without a re-materialization (nix build .#materialize + cp + this script), fail.
        run: |
          ./scripts/update-package-defs-lock.sh
          git diff --exit-code package-defs.lock

  nix-build:
    needs: drift-checks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: georgyo/ordinary-nix-cache@main


      - name: Check Nix formatting (nix fmt must be a no-op)
        run: |
          nix fmt
          git diff --exit-code

      - name: Build the flake (client bundle + avalon_core unit tests)
        # doCheck = true in the derivation runs `dune runtest test`, so this builds and tests.
        run: nix build --print-build-logs .#default

      - name: Stage the client bundle
        run: |
          mkdir -p dist
          cp -L result/* dist/

      - name: Upload the client bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: avalon-bonsai-client
          path: dist/
